<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Blue Grid</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body data-theme="dark">
  
  <div class="min-h-screen flex items-center justify-center relative overflow-hidden">
    <!-- Background Pattern -->
    <div class="absolute inset-0 grid-pattern"></div>
    
    <!-- Gradient Orbs -->
    <div class="absolute top-1/4 -left-20 w-96 h-96 rounded-full opacity-20 blur-3xl" style="background: var(--color-accent);"></div>
    <div class="absolute bottom-1/4 -right-20 w-80 h-80 rounded-full opacity-10 blur-3xl" style="background: var(--color-navy);"></div>
    
    <div class="relative z-10 w-full max-w-md px-6">
      <!-- Logo -->
      <div class="text-center mb-8">
        <a href="../frontend/index.html" class="inline-flex items-center gap-2 font-display text-2xl font-bold" style="color: var(--fg);">
          <i class="fa-solid fa-grid-2 text-2xl" style="color: var(--color-accent);"></i>
          Blue Grid
        </a>
        <p class="mt-2 text-sm" style="color: var(--muted);">Admin Dashboard</p>
      </div>

      <!-- Login Card -->
      <div class="card-base rounded-2xl p-8" style="background: var(--card);">
        <div class="text-center mb-6">
          <div class="w-16 h-16 mx-auto rounded-full flex items-center justify-center mb-4" style="background: rgba(26, 111, 232, 0.1);">
            <i class="fa-solid fa-lock text-2xl" style="color: var(--color-accent);"></i>
          </div>
          <h1 class="font-display text-xl font-semibold mb-2" style="color: var(--fg);">Secure Access</h1>
          <p class="text-sm" style="color: var(--muted);">Enter your password to continue</p>
        </div>

        <form id="login-form" class="space-y-6">
          <div class="space-y-2">
            <label for="password" class="block text-sm font-medium" style="color: var(--fg);">
              <i class="fa-solid fa-key mr-2" style="color: var(--color-accent);"></i>Password
            </label>
            <div class="relative">
              <input 
                type="password" 
                id="password" 
                name="password" 
                required
                class="input-field w-full px-4 py-3 pr-12 rounded-xl font-mono text-sm"
                placeholder="Enter admin password"
                autocomplete="current-password"
              >
              <button 
                type="button" 
                id="toggle-password"
                class="absolute right-3 top-1/2 -translate-y-1/2 p-1 rounded transition-colors hover:text-[var(--color-accent)]"
                style="color: var(--muted);"
                aria-label="Toggle password visibility"
              >
                <i class="fa-solid fa-eye"></i>
              </button>
            </div>
          </div>

          <div id="error-message" class="hidden p-3 rounded-lg text-sm text-center" style="background: rgba(239, 68, 68, 0.1); color: #ef4444;">
            <i class="fa-solid fa-exclamation-circle mr-2"></i>
            <span>Incorrect password. Please try again.</span>
          </div>

          <button 
            type="submit" 
            class="btn-primary w-full px-6 py-3 rounded-xl font-semibold text-base flex items-center justify-center gap-2"
          >
            <i class="fa-solid fa-arrow-right-to-bracket"></i>
            Access Dashboard
          </button>
        </form>

        <div class="mt-6 pt-6 border-t text-center" style="border-color: var(--border);">
          <a href="../frontend/index.html" class="text-sm transition-colors hover:text-[var(--color-accent)]" style="color: var(--muted);">
            <i class="fa-solid fa-arrow-left mr-2"></i>
            Back to Website
          </a>
        </div>
      </div>

      <!-- Security Note -->
      <p class="text-center mt-6 text-xs" style="color: var(--muted);">
        <i class="fa-solid fa-shield-halved mr-1"></i>
        Protected by secure authentication
      </p>
    </div>
  </div>

  <script>
    // Admin password (in production, this should be server-side)
    const ADMIN_PASSWORD = 'bluegrid2025';
    
    // Toggle password visibility
    const toggleBtn = document.getElementById('toggle-password');
    const passwordInput = document.getElementById('password');
    
    toggleBtn.addEventListener('click', () => {
      const type = passwordInput.type === 'password' ? 'text' : 'password';
      passwordInput.type = type;
      toggleBtn.querySelector('i').className = type === 'password' ? 'fa-solid fa-eye' : 'fa-solid fa-eye-slash';
    });
    
    // Login form
    const form = document.getElementById('login-form');
    const errorMessage = document.getElementById('error-message');
    
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const password = passwordInput.value;
      
      if (password === ADMIN_PASSWORD) {
        // Store auth state
        sessionStorage.setItem('bluegrid_admin_auth', 'true');
        // Redirect to dashboard
        window.location.href = 'dashboard.html';
      } else {
        // Show error
        errorMessage.classList.remove('hidden');
        passwordInput.classList.add('input-error');
        
        setTimeout(() => {
          passwordInput.classList.remove('input-error');
        }, 500);
        
        setTimeout(() => {
          errorMessage.classList.add('hidden');
        }, 3000);
      }
    });
  </script>
</body>
</html>
